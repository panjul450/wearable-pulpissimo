; PlatformIO Project Configuration File
;
; Board  : STM32 Nucleo F401RE (ARM Cortex-M4, 84MHz)
; Purpose: NTP time sync via W5500 Ethernet → DS1307 RTC
;
; Upload : Press the arrow button (→) at the bottom of VSCode
; Monitor: Press the plug icon at the bottom of VSCode

[env:nucleo_f401re]
platform = ststm32
board = nucleo_f401re
framework = arduino

; Serial monitor baud rate (must match Serial.begin() in code)
monitor_speed = 115200

; Libraries (auto-downloaded on first build)
lib_deps =
    arduino-libraries/Ethernet@^2.0.2
    adafruit/RTClib@^2.1.4
